<div class="flex min-h-screen bg-white">
  
  <div class="flex-1 flex flex-col justify-center px-8 py-12 sm:px-12 lg:flex-none xl:w-150">
    <div class="mx-auto w-full max-w-sm lg:w-96">
      
      <a href="/" class="flex items-center gap-2 no-underline mb-12">
        <span class="w-3 h-3 bg-green-400 rounded-full"></span>
        <span class="text-xl tracking-tight text-gray-900 font-medium">thech<strong class="text-green-400">blog</strong></span>
      </a>

      <div>
        <h2 class="text-3xl font-semibold tracking-tight text-gray-900">Lorem, ipsum</h2>
        <p class="mt-3 text-sm text-gray-400">
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Quasi eius porro dignissimos!
        </p>
      </div>

      <div class="mt-10">
        <div class="grid grid-cols-1 gap-3">
          <button
            tuiButton
            appearance="outline-grayscale"
            type="button"
            size="m"
            class="font-medium! hover:bg-zinc-50!"
            (click)="loginWithGoogle()"
            [loading]="loadingProvider() === 'google'"
            [disabled]="loadingProvider() !== null"
          >
            <app-icon name="google" />
            Google bilan davom etish
          </button>
          <button
            tuiButton
            appearance="outline-grayscale"
            type="button"
            size="m"
            class="font-medium! hover:bg-zinc-50!"
            [loading]="loadingProvider() === 'linkedin'"
            [disabled]="loadingProvider() !== null"
          >
            <app-icon name="linkedin" />
            Linkedin bilan davom etish
          </button>
        </div>

        <p class="mt-10 text-xs text-gray-400 text-center">
          © 2025 thechblog. <a href="#" class="text-gray-900 no-underline hover:underline">Maxfiylik siyosati</a>
        </p>
      </div>
    </div>
  </div>

  <div class="hidden lg:block relative flex-1 w-0 bg-gray-50 overflow-hidden">
    <div class="absolute inset-0 bg-linear-to-br from-green-400/10 to-transparent z-10"></div>
    
    <div class="absolute inset-0 flex items-center justify-center p-20"></div>
  </div>
</div>
